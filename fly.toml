app = 'friendnewsletter'
primary_region = 'ord'

[build]

[env]
  NODE_ENV = "production"

[mounts]
  source = 'newsletter_data'
  destination = '/app/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
